name: flashdmx_simulator
description: "Simulador de Patch DMX FlashDMX"
publish_to: 'none'
version: 1.2.7+19

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.7
  web: ^1.1.1
  pdf: ^3.10.8
  printing: ^5.11.3
  file_saver: ^0.2.1
  csv: ^6.0.0
  shared_preferences: ^2.2.0
  syncfusion_flutter_xlsio: ^33.2.15
  google_mobile_ads: ^9.0.0
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#000000"
    theme_color: "#000000"
  image_path: "assets/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  image: assets/logo.png
  color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png